# SPEC §12 — Full Docker Compose stack (qdrant, ollama, embed-sidecar, api, ui)
#
# Ports (host → container):
#   6333/6334 — Qdrant REST / gRPC
#   11434     — Ollama
#   8001      — embed-sidecar
#   8080      — API
#   3000      — UI
#
# Quick start:
#   docker compose up -d --build
#   make ollama-pull    # first run only — downloads mistral (~4GB)
#   make seed           # ingest demo fixture into news_radar
#   open http://localhost:3000
#
# Dev (hot reload UI + API):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  qdrant:
    build:
      context: .
      dockerfile: infra/docker/qdrant.Dockerfile
    image: queriva/qdrant:local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # ollama image has no curl; `ollama list` hits the local API
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  embed-sidecar:
    build:
      context: ./packages/embed-sidecar
      dockerfile: Dockerfile
    image: queriva/embed-sidecar:local
    ports:
      - "8001:8001"
    environment:
      - DEFAULT_MODEL=${EMBED_DEFAULT_MODEL:-LaBSE}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    image: queriva/api:local
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_GRPC_PORT=6334
      - EMBED_SIDECAR_URL=http://embed-sidecar:8001
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - SEARCH_MIN_SCORE=${SEARCH_MIN_SCORE:-0.40}
      - SEARCH_MAX_SCORE_AUTO_ACCEPT=${SEARCH_MAX_SCORE_AUTO_ACCEPT:-0.80}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174}
    depends_on:
      qdrant:
        condition: service_healthy
      embed-sidecar:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_DEFAULT_COLLECTION: ${VITE_DEFAULT_COLLECTION:-news_radar}
        VITE_SEARCH_MIN_SCORE: ${VITE_SEARCH_MIN_SCORE:-0.40}
    image: queriva/ui:local
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  qdrant_data:
  ollama_data:
