# SPEC §13 — API configuration defaults
server:
  port: ${API_PORT:8080}

spring:
  application:
    name: queriva-api

management:
  endpoints:
    web:
      exposure:
        include: health

# SPEC §13: QDRANT_URL — default http://localhost:6333; gRPC client uses port 6334
qdrant:
  url: ${QDRANT_URL:http://localhost:6333}
  api-key: ${QDRANT_API_KEY:}
  grpc-port: ${QDRANT_GRPC_PORT:6334}
  timeout-seconds: ${QDRANT_TIMEOUT_SECONDS:30}

# SPEC §13: OLLAMA_URL — default http://localhost:11434; OLLAMA_MODEL — default mistral (ADR-006)
ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:mistral}

# SPEC §13: EMBED_SIDECAR_URL — default http://localhost:8001
embed-sidecar:
  url: ${EMBED_SIDECAR_URL:http://localhost:8001}

# SPEC §13: CORS_ALLOWED_ORIGINS — default localhost:3000 and localhost:5173
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# SPEC §13: HTTP client timeouts for dependency health checks
http:
  connect-timeout-seconds: ${HTTP_CONNECT_TIMEOUT_SECONDS:5}
  read-timeout-seconds: ${HTTP_READ_TIMEOUT_SECONDS:30}

# SPEC §13: INGEST_DEFAULT_CHUNK_SIZE — default 512; INGEST_DEFAULT_OVERLAP — default 64
ingest:
  default-chunk-size: ${INGEST_DEFAULT_CHUNK_SIZE:512}
  default-overlap: ${INGEST_DEFAULT_OVERLAP:64}
  default-upsert-mode: ${INGEST_DEFAULT_UPSERT_MODE:skip_existing}
  batch-size: ${INGEST_BATCH_SIZE:32}

# SPEC §13: EMBED_DEFAULT_MODEL — default LaBSE
embed:
  default-model: ${EMBED_DEFAULT_MODEL:LaBSE}

# SPEC §13: SEARCH_DEFAULT_TOP_K — default 10; SEARCH_MIN_SCORE — default 0.60; SEARCH_MAX_SCORE_AUTO_ACCEPT — default 0.80
search:
  default-top-k: ${SEARCH_DEFAULT_TOP_K:10}
  min-score: ${SEARCH_MIN_SCORE:0.60}
  max-score-auto-accept: ${SEARCH_MAX_SCORE_AUTO_ACCEPT:0.80}
