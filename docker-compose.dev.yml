# SPEC §12 / issue #27 — development overrides (hot reload for api + ui)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# UI: Vite HMR on :3000 (source mounted)
# API: mvn spring-boot:run with source mount (restart picks up Java changes)

services:
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile.dev
    image: queriva/api:dev
    volumes:
      - ./packages/api/src:/app/src
      - ./packages/api/pom.xml:/app/pom.xml:ro
      - api_m2:/root/.m2
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_GRPC_PORT=6334
      - EMBED_SIDECAR_URL=http://embed-sidecar:8001
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - SEARCH_MIN_SCORE=${SEARCH_MIN_SCORE:-0.40}
      - SEARCH_MAX_SCORE_AUTO_ACCEPT=${SEARCH_MAX_SCORE_AUTO_ACCEPT:-0.80}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174}

  ui:
    image: node:20.20.2-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache curl && npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./packages/ui:/app
      - ui_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
      - VITE_DEFAULT_COLLECTION=${VITE_DEFAULT_COLLECTION:-news_radar}
      - VITE_SEARCH_MIN_SCORE=${VITE_SEARCH_MIN_SCORE:-0.40}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  api_m2:
  ui_node_modules:
