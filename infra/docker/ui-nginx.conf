server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed Vite assets
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
