name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '20'
            java-version: '21'
            python-version: '3.11'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/embed-sidecar/requirements.txt
            packages/embed-sidecar/requirements-dev.txt
            packages/ingest-cli/requirements.txt
            packages/ingest-cli/requirements-dev.txt

      - name: Verify Docker is available for Testcontainers
        run: docker info

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

      - name: MFE federation + host typecheck
        run: make test-mfe

      - name: Test
        run: make test
