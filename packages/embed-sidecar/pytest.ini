[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts = --cov=. --cov-report=term-missing --cov-fail-under=90
markers =
    unit: no Docker, fast — run via make test-unit
    integration: requires external services — run via make test-int
    slow: long-running tests — run manually or nightly
