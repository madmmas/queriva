# SPEC §12 — Docker Compose (ingest + RAG stack: qdrant, ollama, embed-sidecar, api; ui in issue #27)
#
# Qdrant ports (host → container):
#   6333 — REST API  (curl http://localhost:6333/collections)
#   6334 — gRPC API  (used by io.qdrant Java client in packages/api)
#
# Ollama port:
#   11434 — REST API (curl http://localhost:11434/api/tags)
#
# Local access: set QDRANT_URL=http://localhost:6333 in .env (see .env.example)
# In-stack access: http://qdrant:6333 when other services join this compose file
#
# Quick start:
#   docker compose up -d --build
#   make ollama-pull    # first run only — downloads mistral (~4GB)
#   make seed

services:
  qdrant:
    build:
      context: .
      dockerfile: infra/docker/qdrant.Dockerfile
    image: queriva/qdrant:local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  embed-sidecar:
    build:
      context: ./packages/embed-sidecar
      dockerfile: Dockerfile
    image: queriva/embed-sidecar:local
    ports:
      - "8001:8001"
    environment:
      - DEFAULT_MODEL=LaBSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    image: queriva/api:local
    ports:
      - "8080:8080"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_GRPC_PORT=6334
      - EMBED_SIDECAR_URL=http://embed-sidecar:8001
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
      - SEARCH_MAX_SCORE_AUTO_ACCEPT=0.80
    depends_on:
      qdrant:
        condition: service_healthy
      embed-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  qdrant_data:
  ollama_data:
